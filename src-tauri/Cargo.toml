[package]
name = "qmux"
version = "0.1.0"
description = "A PTY-owned terminal for Claude Code agent panes."
authors = ["Raymond"]
edition = "2024"

[[bin]]
name = "qmux"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
portable-pty = "0.9"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
